name: formae-container

on:
  workflow_dispatch:
  workflow_call:
    
jobs:

  container_linux:
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set VERSION and CHANNEL
        run: |
          echo VERSION=$(git describe --tags --abbrev=0 --match "[0-9]*" --match "v[0-9]*" | cut -d'-' -f1) >> $GITHUB_ENV
          version=$(git describe --tags --abbrev=0 --match "[0-9]*" --match "v[0-9]*")
          channel=$(echo $version | cut -d'-' -f2-)
          if [[ "$channel" == "$version" ]]; then
            echo CHANNEL=stable >> $GITHUB_ENV
          else
            echo CHANNEL=$channel >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push container image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            CHANNEL=${{ env.CHANNEL }}