name: mutation-test-pr

on:
  pull_request:
    branches: [main]

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Install Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install --yes pkl@0.31.0

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest

      - name: Run mutation tests on changed packages
        run: ./scripts/mutation-test-changed.sh
