name: formae-e2e-tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

# Ensure only one test runs at a time on cloud accounts (shared with plugin-sdk-tests)
concurrency:
  group: cloud-e2e-tests
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  pre-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install aws-nuke
        run: |
          wget -O aws-nuke.tar.gz https://github.com/ekristen/aws-nuke/releases/download/v3.56.2/aws-nuke-v3.56.2-linux-amd64.tar.gz
          tar -xzf aws-nuke.tar.gz
          sudo mv aws-nuke /usr/local/bin/
          sudo chmod +x /usr/local/bin/aws-nuke
          aws-nuke version

      - name: Configure AWS Credentials
        # Fail fast instead of hanging: a stalled STS AssumeRoleWithWebIdentity
        # has been seen retrying for tens of minutes on a flaky runner with no
        # timeout — cap it so the job fails quickly and is re-runnable.
        timeout-minutes: 5
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::942849037363:role/admin-test-pel
          role-session-name: PreCleanupSession

      - name: Nuke Discovery
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --prompt-delay 3

      - name: Purge leftover formae-e2e IAM roles
        # aws-nuke's conformance-protect allowlist keys on the Name property,
        # which inline IAMRolePolicy resources lack, so it protects them and
        # then cannot delete the owning role (DeleteConflict). Remove any
        # formae-e2e-* roles and their inline/attached policies first so the
        # nuke does not wedge on a role left behind by a failed test run.
        run: |
          set -euo pipefail
          for role in $(aws iam list-roles \
            --query "Roles[?starts_with(RoleName, 'formae-e2e-')].RoleName" \
            --output text); do
            echo "Purging leftover role: $role"
            for pol in $(aws iam list-role-policies --role-name "$role" \
              --query "PolicyNames" --output text); do
              aws iam delete-role-policy --role-name "$role" --policy-name "$pol"
            done
            for arn in $(aws iam list-attached-role-policies --role-name "$role" \
              --query "AttachedPolicies[].PolicyArn" --output text); do
              aws iam detach-role-policy --role-name "$role" --policy-arn "$arn"
            done
            for ip in $(aws iam list-instance-profiles-for-role --role-name "$role" \
              --query "InstanceProfiles[].InstanceProfileName" --output text); do
              aws iam remove-role-from-instance-profile \
                --instance-profile-name "$ip" --role-name "$role"
            done
            aws iam delete-role --role-name "$role"
          done

      - name: Nuke AWS
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --no-dry-run

      - name: Configure Azure Credentials
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Cleanup Azure Resource Groups
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          echo "Cleaning up leftover Azure resource groups matching formae-e2e-*"
          for rg in $(az group list --query "[?starts_with(name, 'formae-e2e-')].name" -o tsv); do
            echo "Deleting resource group: $rg"
            az group delete --name "$rg" --yes --no-wait
          done
          # Wait for all deletions to complete
          for rg in $(az group list --query "[?starts_with(name, 'formae-e2e-')].name" -o tsv); do
            echo "Waiting for deletion of: $rg"
            az group wait --name "$rg" --deleted --timeout 300 2>/dev/null || true
          done

  e2e:
    # Pin the check-context name to the test only, so adding plugin dimensions
    # to the matrix below does not rename the GitHub status check. The ruleset's
    # required checks match contexts as "e2e (<test>)".
    name: e2e (${{ matrix.test }}${{ matrix.user_plugins && ' [user-install]' || '' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [pre-cleanup]
    strategy:
      fail-fast: false
      matrix:
        # Each matrix entry installs plugins via one or both of:
        #   system_plugins: orbital install (`formae plugin install`) — lands
        #                   in the binary's SystemPluginDir.
        #   user_plugins:   make install from the plugin repo — lands in
        #                   ~/.pel/formae/plugins (cfg.PluginDir).
        # The agent's multi-source discovery finds plugins from both dirs.
        include:
          - test: TestReconcileApply
            system_plugins: aws azure
          - test: TestPatchApply
            system_plugins: aws azure
          - test: TestDiscovery
            system_plugins: aws azure
          - test: TestSoftReconcile
            system_plugins: aws azure
          - test: TestHardReconcile
            system_plugins: aws azure
          - test: TestReplace
            system_plugins: aws azure
          - test: TestAutoReconcile
            system_plugins: aws
          - test: TestTTL
            system_plugins: aws
          - test: TestCancelCommand
            system_plugins: aws
          - test: TestCascadeDelete
            system_plugins: aws
          - test: TestTargetResolvable
            system_plugins: compose grafana
          - test: TestProjectInit
            system_plugins: aws azure
          - test: TestProfileRouting_E2E
            system_plugins: aws
          - test: TestSimulateApply
            system_plugins: aws
          - test: TestExtractAndReapply
            system_plugins: aws
          # Embedded resolvable inside a String field (CloudFront
          # Function.functionCode). Builds the AWS plugin from its main branch
          # (user-install) so it carries the widened functionCode
          # (String|formae.Embedded) without depending on a published release.
          # TEMPORARY: move back to `system_plugins: aws` (stable channel) once
          # an AWS plugin release ships embed support.
          - test: TestEmbedResolvable
            user_plugins: aws
          - test: TestEvalDefault
            system_plugins: aws
          - test: TestEvalSchemaLocationLocal
            system_plugins: aws
          - test: TestExtractSchemaLocationLocal
            system_plugins: aws
          # User-install variant: aws is `make install`'d from its repo
          # (not in orbital's tree) so the merge code path in
          # listPluginsHandler is the only thing that can surface its
          # LocalPath for --schema-location local. Catches regressions in
          # the orbital-vs-registered union.
          - test: TestExtractSchemaLocationLocal
            user_plugins: aws
          - test: TestAuthBasic
            system_plugins: auth-basic
          - test: TestPluginConfig
            system_plugins: sftp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install --yes pkl@0.31.0

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Configure AWS Credentials
        # Fail fast instead of hanging on a stalled STS call (see above).
        timeout-minutes: 5
        id: creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::942849037363:role/admin-test-pel
          role-session-name: PublishSession
          output-credentials: true

      - name: Add profile credentials to ~/.aws/credentials
        run: |
          mkdir -p ~/.aws
          aws configure set aws_access_key_id ${{ steps.creds.outputs.aws-access-key-id }} --profile e2e-test
          aws configure set aws_secret_access_key ${{ steps.creds.outputs.aws-secret-access-key }} --profile e2e-test
          aws configure set region us-west-2 --profile e2e-test

      - name: Test AWS Access
        run: aws sts get-caller-identity

      - name: Configure Azure Credentials
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install system plugins via orbital
        if: ${{ matrix.system_plugins }}
        run: |
          set -euo pipefail

          # Build the formae binary and stage it in an installer-shaped tree
          # so orbital (in Embedded mode, derives treeRoot from binary path)
          # uses dist/e2e/ as the install root. The bootstrap agent below
          # installs plugins through the same orbital tree the test agents
          # will later read from (via the SystemPluginDir scan added in
          # the multi-source plugin discovery refactor).
          make build
          mkdir -p dist/e2e/bin dist/e2e/.ops
          cp formae dist/e2e/bin/formae

          # Minimal bootstrap config — uses the default artifacts.repositories
          # (pel#stable + community#stable), no auth, no discovery, no sync.
          cat > /tmp/bootstrap.conf.pkl <<'EOF'
          amends "formae:/Config.pkl"

          agent {
              server { port = 49684 }
              datastore {
                  datastoreType = "sqlite"
                  sqlite { filePath = "/tmp/bootstrap.db" }
              }
              synchronization { enabled = false }
              discovery { enabled = false }
              logging { consoleLogLevel = "info" }
          }

          cli {
              api { port = 49684 }
              disableUsageReporting = true
          }
          EOF

          # Start the bootstrap agent in the background.
          FORMAE_PID_FILE=/tmp/bootstrap.pid \
            dist/e2e/bin/formae agent start --config /tmp/bootstrap.conf.pkl \
            > /tmp/bootstrap-agent.log 2>&1 &
          AGENT_PID=$!

          # Wait up to 30s for the agent to come up.
          for i in $(seq 1 30); do
              if curl -sf http://localhost:49684/api/v1/health >/dev/null 2>&1; then
                  echo "Bootstrap agent ready after ${i}s"
                  break
              fi
              sleep 1
          done
          if ! curl -sf http://localhost:49684/api/v1/health >/dev/null 2>&1; then
              echo "::error::Bootstrap agent did not become healthy"
              cat /tmp/bootstrap-agent.log || true
              exit 1
          fi

          # Install only the plugins this test needs. The agent refreshes
          # orbital's repository cache at startup, so the install candidate
          # solver has fresh metadata to work with.
          # Bridge: pin aws to 0.1.12. aws 0.1.13's Role read embeds
          # sibling-managed inline policies, so the drift guard rejects the
          # patch (TestPatchApply/AWS). Remove the pin once aws 0.1.14 ships.
          plugins=""
          for p in ${{ matrix.system_plugins }}; do
            if [ "$p" = "aws" ]; then p="aws@0.1.12"; fi
            plugins="$plugins $p"
          done
          dist/e2e/bin/formae plugin install $plugins --channel stable

          # Stop the bootstrap agent so the test harness can spawn its own.
          kill -TERM "$AGENT_PID" || true
          wait "$AGENT_PID" 2>/dev/null || true
          rm -f /tmp/bootstrap.pid /tmp/bootstrap.db /tmp/bootstrap.conf.pkl

      - name: Install user plugins via make install
        if: ${{ matrix.user_plugins }}
        run: |
          set -euo pipefail

          # Mirror the dev workflow: clone the plugin repo, run `make install`.
          # Lands in ~/.pel/formae/plugins/<name>/v<version>/, which is
          # cfg.PluginDir's default — the test agent's multi-source discovery
          # finds it without any config override. Crucially, orbital has no
          # record of these plugins, so the agent surfaces them only via the
          # PluginCoordinator-registered merge path in listPluginsHandler.
          for plugin in ${{ matrix.user_plugins }}; do
            git clone --depth=1 \
              "https://github.com/platform-engineering-labs/formae-plugin-${plugin}.git" \
              "/tmp/formae-plugin-${plugin}"
            (cd "/tmp/formae-plugin-${plugin}" && make install)
          done

      - name: Running ${{ matrix.test }}
        env:
          AWS_PROFILE: e2e-test
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # Unique per run+attempt so fixtures can name globally-scoped cloud
          # resources (e.g. CloudFront KeyValueStore/Function, which aws-nuke
          # does not clean) without colliding across reruns or concurrent jobs.
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          # Point setup_pkl.sh at whichever tree has plugins. system_plugins
          # land in dist/e2e/formae/plugins (orbital's SystemPluginDir);
          # user_plugins land in /home/runner/.pel/formae/plugins (make
          # install default on ubuntu-latest). Hardcoded paths because
          # GHA expressions can't read $HOME, and the empty-string
          # alternative is falsy in `&& ''`/`|| ...` chains.
          FORMAE_PLUGIN_DIR: >-
            ${{ matrix.user_plugins && '/home/runner/.pel/formae/plugins'
                || format('{0}/dist/e2e/formae/plugins', github.workspace) }}
        run: >-
          make test-e2e
          E2E_RUN_FLAGS="-run ${{ matrix.test }}"

  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [e2e]
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v4

      - name: Install aws-nuke
        run: |
          wget -O aws-nuke.tar.gz https://github.com/ekristen/aws-nuke/releases/download/v3.56.2/aws-nuke-v3.56.2-linux-amd64.tar.gz
          tar -xzf aws-nuke.tar.gz
          sudo mv aws-nuke /usr/local/bin/
          sudo chmod +x /usr/local/bin/aws-nuke
          aws-nuke version

      - name: Configure AWS Credentials
        # Fail fast instead of hanging: a stalled STS AssumeRoleWithWebIdentity
        # has been seen retrying for tens of minutes on a flaky runner with no
        # timeout — cap it so the job fails quickly and is re-runnable.
        timeout-minutes: 5
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::942849037363:role/admin-test-pel
          role-session-name: NukeSession

      - name: Nuke Discovery
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --prompt-delay 3

      - name: Purge leftover formae-e2e IAM roles
        # aws-nuke's conformance-protect allowlist keys on the Name property,
        # which inline IAMRolePolicy resources lack, so it protects them and
        # then cannot delete the owning role (DeleteConflict). Remove any
        # formae-e2e-* roles and their inline/attached policies first so the
        # nuke does not wedge on a role left behind by a failed test run.
        run: |
          set -euo pipefail
          for role in $(aws iam list-roles \
            --query "Roles[?starts_with(RoleName, 'formae-e2e-')].RoleName" \
            --output text); do
            echo "Purging leftover role: $role"
            for pol in $(aws iam list-role-policies --role-name "$role" \
              --query "PolicyNames" --output text); do
              aws iam delete-role-policy --role-name "$role" --policy-name "$pol"
            done
            for arn in $(aws iam list-attached-role-policies --role-name "$role" \
              --query "AttachedPolicies[].PolicyArn" --output text); do
              aws iam detach-role-policy --role-name "$role" --policy-arn "$arn"
            done
            for ip in $(aws iam list-instance-profiles-for-role --role-name "$role" \
              --query "InstanceProfiles[].InstanceProfileName" --output text); do
              aws iam remove-role-from-instance-profile \
                --instance-profile-name "$ip" --role-name "$role"
            done
            aws iam delete-role --role-name "$role"
          done

      - name: Nuke AWS
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --no-dry-run

      - name: Configure Azure Credentials
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Cleanup Azure Resource Groups
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          echo "Cleaning up leftover Azure resource groups matching formae-e2e-*"
          for rg in $(az group list --query "[?starts_with(name, 'formae-e2e-')].name" -o tsv); do
            echo "Deleting resource group: $rg"
            az group delete --name "$rg" --yes --no-wait
          done
