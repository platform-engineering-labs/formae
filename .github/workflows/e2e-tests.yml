name: formae-e2e-tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

# Ensure only one test runs at a time on cloud accounts (shared with plugin-sdk-tests)
concurrency:
  group: cloud-e2e-tests
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  pre-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install aws-nuke
        run: |
          wget -O aws-nuke.tar.gz https://github.com/ekristen/aws-nuke/releases/download/v3.56.2/aws-nuke-v3.56.2-linux-amd64.tar.gz
          tar -xzf aws-nuke.tar.gz
          sudo mv aws-nuke /usr/local/bin/
          sudo chmod +x /usr/local/bin/aws-nuke
          aws-nuke version

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::942849037363:role/admin-test-pel
          role-session-name: PreCleanupSession

      - name: Nuke Discovery
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --prompt-delay 3

      - name: Nuke AWS
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --no-dry-run

      - name: Configure Azure Credentials
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Cleanup Azure Resource Groups
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          echo "Cleaning up leftover Azure resource groups matching formae-e2e-*"
          for rg in $(az group list --query "[?starts_with(name, 'formae-e2e-')].name" -o tsv); do
            echo "Deleting resource group: $rg"
            az group delete --name "$rg" --yes --no-wait
          done
          # Wait for all deletions to complete
          for rg in $(az group list --query "[?starts_with(name, 'formae-e2e-')].name" -o tsv); do
            echo "Waiting for deletion of: $rg"
            az group wait --name "$rg" --deleted --timeout 300 2>/dev/null || true
          done

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [pre-cleanup]
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: TestReconcileApply
            plugins: aws azure
          - test: TestPatchApply
            plugins: aws azure
          - test: TestDiscovery
            plugins: aws azure
          - test: TestSoftReconcile
            plugins: aws azure
          - test: TestHardReconcile
            plugins: aws azure
          - test: TestReplace
            plugins: aws azure
          - test: TestAutoReconcile
            plugins: aws
          - test: TestTTL
            plugins: aws
          - test: TestCancelCommand
            plugins: aws
          - test: TestCascadeDelete
            plugins: aws
          - test: TestTargetResolvable
            plugins: compose grafana
          - test: TestProjectInit
            plugins: azure
          - test: TestSimulateApply
            plugins: aws
          - test: TestExtractAndReapply
            plugins: aws
          - test: TestAuthBasic
            plugins: auth-basic
          - test: TestPluginConfig
            plugins: sftp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install --yes pkl@0.31.0

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Configure AWS Credentials
        id: creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::942849037363:role/admin-test-pel
          role-session-name: PublishSession
          output-credentials: true

      - name: Add profile credentials to ~/.aws/credentials
        run: |
          mkdir -p ~/.aws
          aws configure set aws_access_key_id ${{ steps.creds.outputs.aws-access-key-id }} --profile e2e-test
          aws configure set aws_secret_access_key ${{ steps.creds.outputs.aws-secret-access-key }} --profile e2e-test
          aws configure set region us-west-2 --profile e2e-test

      - name: Test AWS Access
        run: aws sts get-caller-identity

      - name: Configure Azure Credentials
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install plugins via orbital
        run: |
          set -euo pipefail

          # Build the formae binary and stage it in an installer-shaped tree
          # so orbital (in Embedded mode, derives treeRoot from binary path)
          # uses dist/e2e/ as the install root. The bootstrap agent below
          # installs plugins through the same orbital tree the test agents
          # will later read from (via the SystemPluginDir scan added in
          # the multi-source plugin discovery refactor).
          make build
          mkdir -p dist/e2e/bin dist/e2e/.ops
          cp formae dist/e2e/bin/formae

          # Minimal bootstrap config — uses the default artifacts.repositories
          # (pel#stable + community#stable), no auth, no discovery, no sync.
          cat > /tmp/bootstrap.conf.pkl <<'EOF'
          amends "formae:/Config.pkl"

          agent {
              server { port = 49684 }
              datastore {
                  datastoreType = "sqlite"
                  sqlite { filePath = "/tmp/bootstrap.db" }
              }
              synchronization { enabled = false }
              discovery { enabled = false }
              logging { consoleLogLevel = "info" }
          }

          cli {
              api { port = 49684 }
              disableUsageReporting = true
          }
          EOF

          # Start the bootstrap agent in the background.
          FORMAE_PID_FILE=/tmp/bootstrap.pid \
            dist/e2e/bin/formae agent start --config /tmp/bootstrap.conf.pkl \
            > /tmp/bootstrap-agent.log 2>&1 &
          AGENT_PID=$!

          # Wait up to 30s for the agent to come up.
          for i in $(seq 1 30); do
              if curl -sf http://localhost:49684/api/v1/health >/dev/null 2>&1; then
                  echo "Bootstrap agent ready after ${i}s"
                  break
              fi
              sleep 1
          done
          if ! curl -sf http://localhost:49684/api/v1/health >/dev/null 2>&1; then
              echo "::error::Bootstrap agent did not become healthy"
              cat /tmp/bootstrap-agent.log || true
              exit 1
          fi

          # Warm orbital's cache. The agent's install endpoint does not
          # auto-refresh repository metadata, so a fresh tree fails with
          # "no install candidates found". `plugin search` invokes the
          # Available API which does refresh, populating the cache.
          # TODO: drop this once the install endpoint refreshes itself.
          dist/e2e/bin/formae plugin search --channel stable >/dev/null

          # Install only the plugins this test needs.
          dist/e2e/bin/formae plugin install ${{ matrix.plugins }} --channel stable

          # Stop the bootstrap agent so the test harness can spawn its own.
          kill -TERM "$AGENT_PID" || true
          wait "$AGENT_PID" 2>/dev/null || true
          rm -f /tmp/bootstrap.pid /tmp/bootstrap.db /tmp/bootstrap.conf.pkl

      - name: Running ${{ matrix.test }}
        env:
          AWS_PROFILE: e2e-test
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # Point setup_pkl.sh at the orbital-installed plugins. The agent's
          # own multi-source discovery already finds them via the binary's
          # SystemPluginDir, but setup_pkl.sh is a shell script that needs
          # an explicit dir to read PklProject manifests from.
          FORMAE_PLUGIN_DIR: ${{ github.workspace }}/dist/e2e/formae/plugins
        run: >-
          make test-e2e
          E2E_RUN_FLAGS="-run ${{ matrix.test }}"

  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [e2e]
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v4

      - name: Install aws-nuke
        run: |
          wget -O aws-nuke.tar.gz https://github.com/ekristen/aws-nuke/releases/download/v3.56.2/aws-nuke-v3.56.2-linux-amd64.tar.gz
          tar -xzf aws-nuke.tar.gz
          sudo mv aws-nuke /usr/local/bin/
          sudo chmod +x /usr/local/bin/aws-nuke
          aws-nuke version

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::942849037363:role/admin-test-pel
          role-session-name: NukeSession

      - name: Nuke Discovery
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --prompt-delay 3

      - name: Nuke AWS
        run: |
          aws-nuke nuke -c tests/e2e/config/nuke-config.yaml --no-prompt --no-dry-run

      - name: Configure Azure Credentials
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Cleanup Azure Resource Groups
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          echo "Cleaning up leftover Azure resource groups matching formae-e2e-*"
          for rg in $(az group list --query "[?starts_with(name, 'formae-e2e-')].name" -o tsv); do
            echo "Deleting resource group: $rg"
            az group delete --name "$rg" --yes --no-wait
          done
