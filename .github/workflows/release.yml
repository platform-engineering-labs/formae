name: formae-release

on:
  workflow_dispatch:
    inputs:
      pkg_job:
        description: "platform to build and publish"
        type: choice
        default: "all"
        options:
          - "all"
          - "pkg_pkl"
          - "pkg_opkg"
      skip_plugin_checks:
        description: "Skip plugin nightly verification (use with caution)"
        type: boolean
        default: false
  push:
    tags:
      - '[0-9]*'  # Only release tags, not pkg/*/v* module tags

permissions:
  id-token: write
  contents: read
  packages: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Generate peldroid app token
        if: github.repository == 'platform-engineering-labs/formae'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PELDROID_APP_ID }}
          private-key: ${{ secrets.PELDROID_PRIVATE_KEY }}
          owner: platform-engineering-labs
          repositories: formae,formae-plugin-azure,formae-plugin-aws,formae-plugin-gcp,formae-plugin-oci,formae-plugin-ovh

      - name: Verify core CI checks
        if: github.repository == 'platform-engineering-labs/formae'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for commit $SHA"
          FAILED=""
          for workflow in formae-go formae-pkl; do
            CONCLUSION=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow="$workflow" \
              --commit="$SHA" \
              --json conclusion \
              --jq '.[0].conclusion // "not_found"')
            echo "$workflow: $CONCLUSION"
            if [ "$CONCLUSION" != "success" ]; then
              echo "::error::Workflow '$workflow' status: $CONCLUSION for commit $SHA"
              FAILED="$FAILED $workflow"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Required CI checks did not pass:$FAILED"
            exit 1
          fi
          echo "All core CI checks passed."

      - name: Verify plugin nightlies
        if: ${{ github.repository == 'platform-engineering-labs/formae' && inputs.skip_plugin_checks != true }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PLUGINS=(
            "platform-engineering-labs/formae-plugin-azure"
            "platform-engineering-labs/formae-plugin-aws"
            "platform-engineering-labs/formae-plugin-gcp"
            "platform-engineering-labs/formae-plugin-oci"
            "platform-engineering-labs/formae-plugin-ovh"
          )
          echo "Checking last nightly run for each plugin..."
          FAILED=""
          for repo in "${PLUGINS[@]}"; do
            CONCLUSION=$(gh run list \
              --repo="$repo" \
              --workflow="Nightly" \
              --limit=1 \
              --json conclusion \
              --jq '.[0].conclusion // "not_found"')
            echo "$repo: $CONCLUSION"
            if [ "$CONCLUSION" != "success" ]; then
              echo "::warning::Plugin nightly for $repo: $CONCLUSION"
              FAILED="$FAILED $(basename $repo)"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Plugin nightlies not green:$FAILED"
            exit 1
          fi
          echo "All plugin nightlies are green."

  pkg_pkl:
    runs-on: ubuntu-latest

    if: ${{ contains(fromJSON('["", "all", "pkg_pkl"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}
    needs: [verify]

    concurrency:
      group: package_pkl
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install --yes pkl@0.31.0

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::897722706215:role/github-pel
          role-session-name: PublishSession

      - name: Resolve Pkl
        run: make gen-pkl

      - name: Package Pkl
        run: make pkg-pkl

      - name: Publish core PKL schema to S3
        run: make publish-pkl

      - name: Package external plugin PKL schemas
        run: make pkg-external-pkl

      - name: Publish external plugin PKL schemas to S3
        run: make publish-external-pkl

  pkg_opkg:
    uses: "./.github/workflows/package.yml"
    secrets: inherit
    if: ${{ contains(fromJSON('["", "pkg_opkg", "all"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}

  pkg_container:
    uses: "./.github/workflows/container.yml"
    secrets: inherit
    if: ${{ contains(fromJSON('["", "all"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}
    needs:
      - verify
      - pkg_opkg

  notify_helm_chart:
    runs-on: ubuntu-latest
    if: ${{ contains(fromJSON('["", "all"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}
    needs:
      - pkg_container

    steps:
      - name: Generate peldroid token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PELDROID_APP_ID }}
          private-key: ${{ secrets.PELDROID_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: formae-helm

      - name: Dispatch to helm-chart repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: platform-engineering-labs/formae-helm
          event-type: formae-release
          client-payload: '{"version": "${{ github.ref_name }}"}'

  notify_success:
    runs-on: ubuntu-latest
    needs: [pkg_pkl, pkg_opkg, pkg_container]
    if: success()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rocket: Release ${{ github.ref_name }} published successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *Release ${{ github.ref_name }} published successfully*\n\nAll artifacts built and published."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  notify_failure:
    runs-on: ubuntu-latest
    needs: [verify, pkg_pkl, pkg_opkg, pkg_container]
    if: failure()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: Release ${{ github.ref_name }} failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Release ${{ github.ref_name }} failed*\n\nOne or more release jobs did not complete successfully."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
