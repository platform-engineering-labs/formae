name: formae-package

on:
  workflow_dispatch:
    inputs:
      pkg_job:
        description: "platform to build and publish"
        type: choice
        default: "all"
        options:
          - "all"
          - "pkg_linux_arm64"
          - "pkg_linux_x8664"
          - "pkg_macos_arm64"
          - "pkg_macos_x8664"
  push:
    branches:
      - main
    tags:
      - '[0-9]*'  # Only package tags, not pkg/*/v* module tags

permissions:
  id-token: write
  contents: read
  packages: write
  attestations: write

env:
  OPS_PKG_CRT: ${{ secrets.OPS_PKG_CRT }}
  OPS_PKG_KEY: ${{ secrets.OPS_PKG_KEY }}
  OPS_TREE_CONF: ${{ secrets.OPS_TREE_CONF }}
  OPS_CHANNEL: ${{ startsWith(github.ref, 'refs/tags/') && 'stable' || 'dev' }}

jobs:
  pkg_linux_arm64:
    runs-on: ubuntu-24.04-arm

    if: ${{ contains(fromJSON('["", "all", "pkg_linux_arm64"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}

    concurrency:
      group: pkg_linux_arm64
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install Orbital and Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install orbital

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::897722706215:role/github-pel
          role-session-name: PublishSession

      - name: Build and Publish
        run: just publish

  pkg_linux_x8664:
    runs-on: ubuntu-latest

    if: ${{ contains(fromJSON('["", "all", "pkg_linux_x8664"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}

    concurrency:
      group: pkg_linux_x8664
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install Orbital and Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install orbital

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::897722706215:role/github-pel
          role-session-name: PublishSession

      - name: Build and Publish
        run: just publish

  pkg_macos_arm64:
    runs-on: macos-latest

    if: ${{ contains(fromJSON('["", "all", "pkg_macos_arm64"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}

    concurrency:
      group: pkg_macos_arm64
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install Orbital and Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install orbital

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::897722706215:role/github-pel
          role-session-name: PublishSession

      - name: Build and Publish
        run: just publish

  pkg_macos_x8664:
    runs-on: macos-15-intel

    if: ${{ contains(fromJSON('["", "all", "pkg_macos_x8664"]'), inputs.pkg_job) && github.actor != 'peldroid[bot]' }}

    concurrency:
      group: pkg_macos_x8664
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install Orbital and Pkl
        run: |
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- install orbital

      - name: Add PEL to PATH
        run: echo "/opt/pel/bin" >> $GITHUB_PATH

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::897722706215:role/github-pel
          role-session-name: PublishSession

      - name: Build and Publish
        run: just publish