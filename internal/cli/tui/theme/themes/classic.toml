name = "classic"

[palette]
base             = { light = "#FFFFFF", dark = "#000000" }
surface          = { light = "#FFFFFF", dark = "#111111" }
text_primary     = { light = "#000000", dark = "#FFFFFF" }
text_secondary   = { light = "#666666", dark = "#808080" }
text_subtle      = { light = "#999999", dark = "#555555" }
border           = { light = "#CCCCCC", dark = "#444444" }
selection        = { light = "#DDDDDD", dark = "#3A3A3A" }
primary_accent   = { light = "#5B9BD5", dark = "#ADD8E6" }
secondary_accent = "#B5B55B"
error            = { light = "#FF0000", dark = "#FF6666" }
error_subtle     = { light = "#A94442", dark = "#994444" }
error_bright     = { light = "#CC0000", dark = "#FF9999" }
warning          = "#B5B55B"
done             = { light = "#008000", dark = "#00FF00" }
in_progress      = { light = "#5B9BD5", dark = "#ADD8E6" }
pending          = "#808080"
op_create  = { light = "#008000", dark = "#00FF00" }
op_update  = { light = "#5B9BD5", dark = "#ADD8E6" }
op_delete  = { light = "#FF0000", dark = "#FF6666" }
op_replace = { light = "#FF6B00", dark = "#FF8533" }
op_detach  = { light = "#999999", dark = "#777777" }
op_keep    = { light = "#999999", dark = "#777777" }

[glyphs]
op_create = "+"
op_update = "~"
op_delete = "-"
op_replace = "↻"
op_detach = "⊘"
op_keep = "="
status_done = "✓"
status_failed = "✗"
status_pending = "·"
status_inprogress = "◐"
status_skipped = "⊘"
status_canceled = "⊘"
ack_done = "✓"
ack_skip = "·"
ack_warn = "!"
ack_fail = "✗"
tree_branch = "├"
tree_last = "└"
expand_open = "▾"
expand_closed = "▸"
checkbox_on = "[x]"
checkbox_off = "[ ]"
transition = "→"

[progress]
fill_done = "█"
fill_inprogress = "▓"
fill_pending = "░"
animation = "static"

[spinner]
frames = ["◐", "◓", "◑", "◒"]
interval_ms = 120
static_frame = "◐"

[confirmation_bar]
color = "brand"
