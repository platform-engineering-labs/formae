name = "colorblind"

[palette]
base             = { light = "#F5F5F5", dark = "#1A1A2E" }
surface          = { light = "#FFFFFF", dark = "#16213E" }
text_primary     = { light = "#1A1A1A", dark = "#E8E8E8" }
text_secondary   = { light = "#666666", dark = "#AAAAAA" }
text_subtle      = "#999999"
border           = { light = "#DDDDDD", dark = "#555566" }
selection        = { light = "#DDDDDD", dark = "#3A3A3A" }
primary_accent   = { light = "#2563EB", dark = "#81D1DB" }
secondary_accent = { light = "#FF6B00", dark = "#FF8533" }
# Blue/orange safe pairing; avoid relying on red vs green.
error            = { light = "#D55E00", dark = "#E69F55" }
error_subtle     = { light = "#B45454", dark = "#9B4444" }
error_bright     = { light = "#B91C1C", dark = "#FCA5A5" }
warning          = "#B5B55B"
done             = { light = "#0072B2", dark = "#56B4E9" }
in_progress      = { light = "#444444", dark = "#AAAAAA" }
pending          = { light = "#999999", dark = "#555555" }
op_create  = { light = "#0072B2", dark = "#56B4E9" }
op_update  = { light = "#009E73", dark = "#33C295" }
op_delete  = { light = "#D55E00", dark = "#E69F55" }
op_replace = { light = "#CC79A7", dark = "#E6A0C4" }
op_detach  = { light = "#999999", dark = "#777777" }
op_keep    = { light = "#999999", dark = "#777777" }

[glyphs]
op_create = "+"
op_update = "~"
op_delete = "-"
op_replace = "↻"
op_detach = "⊘"
op_keep = "="
status_done = "✓"
status_failed = "✗"
status_pending = "·"
status_inprogress = "◐"
status_skipped = "⊘"
status_canceled = "⊘"
ack_done = "✓"
ack_skip = "·"
ack_warn = "!"
ack_fail = "✗"
tree_branch = "├"
tree_last = "└"
expand_open = "▾"
expand_closed = "▸"
sort_marker = "▲"
checkbox_on = "[x]"
checkbox_off = "[ ]"
transition = "→"

[progress]
# Distinct textures per state so shape (not only hue) carries meaning.
fill_done = "█"
fill_inprogress = "▚"
fill_pending = "░"
animation = "blink"

[spinner]
frames = ["◐", "◓", "◑", "◒"]
interval_ms = 120
static_frame = "◐"

[confirmation_bar]
color = "brand"
